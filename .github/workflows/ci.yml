name: ci

on:
  push:
  pull_request:

jobs:
  gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Test
        run: make test
      - name: Fuzz smoke
        run: make fuzz
      - name: Valgrind
        run: make valgrind
      - name: GCC analyzer
        run: make analyze
      - name: Sanitizers
        run: make sanitize

  clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Test with Clang
        run: make clean test CC=clang
